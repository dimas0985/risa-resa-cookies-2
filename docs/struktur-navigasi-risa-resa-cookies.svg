<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Struktur Navigasi - Risa Resa Cookies</title>
  <desc id="desc">Diagram struktur navigasi aplikasi Risa Resa Cookies dari beranda, katalog, keranjang, checkout, autentikasi, dan dashboard admin.</desc>
  <defs>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #78350f; }
      .box-title { font: 700 15px Arial, sans-serif; fill: #111827; }
      .box-text { font: 13px Arial, sans-serif; fill: #374151; }
      .label { font: 12px Arial, sans-serif; fill: #374151; }
      .note { font: 13px Arial, sans-serif; fill: #78350f; }
      .line { stroke: #374151; stroke-width: 2; fill: none; }
      .amber { stroke: #b45309; }
      .blue { stroke: #2563eb; }
      .green { stroke: #16a34a; }
      .red { stroke: #dc2626; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M1,1 L9,4 L1,7 Z" fill="#374151"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M1,1 L9,4 L1,7 Z" fill="#b45309"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M1,1 L9,4 L1,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M1,1 L9,4 L1,7 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M1,1 L9,4 L1,7 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="700" y="56" text-anchor="middle" class="title">Struktur Navigasi - Risa Resa Cookies</text>

  <g transform="translate(590 100)">
    <rect width="220" height="70" rx="8" fill="#78350f" stroke="#451a03" stroke-width="2"/>
    <text x="110" y="29" text-anchor="middle" fill="#ffffff" class="box-title">Risa Resa Cookies</text>
    <text x="110" y="51" text-anchor="middle" fill="#ffffff" class="box-text">/</text>
  </g>

  <g transform="translate(210 220)">
    <rect width="260" height="50" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
    <text x="130" y="31" text-anchor="middle" class="box-title" fill="#78350f">Navigasi Pengunjung / Customer</text>
  </g>
  <g transform="translate(570 220)">
    <rect width="260" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="130" y="31" text-anchor="middle" class="box-title" fill="#1e3a8a">Autentikasi</text>
  </g>
  <g transform="translate(930 220)">
    <rect width="260" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="130" y="31" text-anchor="middle" class="box-title" fill="#14532d">Navigasi Admin</text>
  </g>

  <g transform="translate(80 340)">
    <rect width="170" height="60" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
    <text x="85" y="25" text-anchor="middle" class="box-title">Beranda</text>
    <text x="85" y="45" text-anchor="middle" class="box-text">/</text>
  </g>
  <g transform="translate(310 340)">
    <rect width="180" height="60" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" class="box-title">Katalog Produk</text>
    <text x="90" y="45" text-anchor="middle" class="box-text">/products</text>
  </g>
  <g transform="translate(310 460)">
    <rect width="180" height="60" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" class="box-title">Detail Produk</text>
    <text x="90" y="45" text-anchor="middle" class="box-text">/products/:id</text>
  </g>
  <g transform="translate(80 580)">
    <rect width="170" height="60" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
    <text x="85" y="25" text-anchor="middle" class="box-title">Keranjang</text>
    <text x="85" y="45" text-anchor="middle" class="box-text">/cart</text>
  </g>
  <g transform="translate(310 580)">
    <rect width="180" height="60" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" class="box-title">Checkout</text>
    <text x="90" y="45" text-anchor="middle" class="box-text">/checkout</text>
  </g>
  <g transform="translate(310 700)">
    <rect width="180" height="60" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="90" y="28" text-anchor="middle" class="box-title">Konfirmasi via</text>
    <text x="90" y="48" text-anchor="middle" class="box-title">WhatsApp</text>
  </g>

  <g transform="translate(610 340)">
    <rect width="180" height="60" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" class="box-title">Login</text>
    <text x="90" y="45" text-anchor="middle" class="box-text">/login</text>
  </g>
  <g transform="translate(610 460)">
    <rect width="180" height="60" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" class="box-title">Register</text>
    <text x="90" y="45" text-anchor="middle" class="box-text">/register</text>
  </g>
  <g transform="translate(610 580)">
    <rect width="180" height="60" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" class="box-title">Logout</text>
    <text x="90" y="45" text-anchor="middle" class="box-text">hapus token &amp; user</text>
  </g>

  <g transform="translate(970 340)">
    <rect width="180" height="60" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" class="box-title">Dashboard Admin</text>
    <text x="90" y="45" text-anchor="middle" class="box-text">/admin</text>
  </g>
  <g transform="translate(850 460)">
    <rect width="190" height="70" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="95" y="25" text-anchor="middle" class="box-title">Ringkasan</text>
    <text x="95" y="47" text-anchor="middle" class="box-text">Produk, Pesanan,</text>
    <text x="95" y="63" text-anchor="middle" class="box-text">Pelanggan, Omzet</text>
  </g>
  <g transform="translate(1080 460)">
    <rect width="190" height="70" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="95" y="25" text-anchor="middle" class="box-title">Kelola Produk</text>
    <text x="95" y="50" text-anchor="middle" class="box-text">Tambah, Edit, Hapus</text>
  </g>
  <g transform="translate(850 580)">
    <rect width="190" height="70" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="95" y="25" text-anchor="middle" class="box-title">Kelola Pesanan</text>
    <text x="95" y="50" text-anchor="middle" class="box-text">Edit Status, Hapus</text>
  </g>
  <g transform="translate(1080 580)">
    <rect width="190" height="70" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="95" y="25" text-anchor="middle" class="box-title">Data Pelanggan</text>
    <text x="95" y="50" text-anchor="middle" class="box-text">Daftar User Customer</text>
  </g>

  <path d="M640 170 L340 220" class="line" marker-end="url(#arrow)"/>
  <path d="M700 170 L700 220" class="line" marker-end="url(#arrow)"/>
  <path d="M760 170 L1060 220" class="line" marker-end="url(#arrow)"/>
  <path d="M260 270 L165 340" class="line amber" marker-end="url(#arrowAmber)"/>
  <path d="M400 270 L400 340" class="line amber" marker-end="url(#arrowAmber)"/>
  <path d="M250 370 L310 370" class="line amber" marker-end="url(#arrowAmber)"/>
  <text x="258" y="359" class="label">Lihat Produk</text>
  <path d="M400 400 L400 460" class="line amber" marker-end="url(#arrowAmber)"/>
  <text x="411" y="433" class="label">Detail</text>
  <path d="M310 380 L165 580" class="line amber" marker-end="url(#arrowAmber)"/>
  <text x="180" y="487" class="label">Tambah ke Keranjang</text>
  <path d="M310 500 L250 590" class="line amber" marker-end="url(#arrowAmber)"/>
  <path d="M250 610 L310 610" class="line amber" marker-end="url(#arrowAmber)"/>
  <text x="258" y="600" class="label">Checkout</text>
  <path d="M400 640 L400 700" class="line green" marker-end="url(#arrowGreen)"/>
  <text x="412" y="674" class="label">Buat Pesanan</text>
  <path d="M490 600 L610 385" class="line blue" stroke-dasharray="6 5" marker-end="url(#arrowBlue)"/>
  <text x="520" y="500" class="label">Belum login</text>

  <path d="M700 270 L700 340" class="line blue" marker-end="url(#arrowBlue)"/>
  <path d="M700 400 L700 460" class="line blue" marker-end="url(#arrowBlue)"/>
  <text x="711" y="433" class="label">Daftar sekarang</text>
  <path d="M610 490 L500 385 L610 370" class="line blue" marker-end="url(#arrowBlue)"/>
  <text x="505" y="432" class="label">Selesai daftar</text>
  <path d="M610 370 L250 370" class="line blue" marker-end="url(#arrowBlue)"/>
  <text x="505" y="359" class="label">Customer</text>
  <path d="M790 370 L970 370" class="line green" marker-end="url(#arrowGreen)"/>
  <text x="862" y="359" class="label">Admin</text>
  <path d="M610 610 L250 380" class="line red" marker-end="url(#arrowRed)"/>

  <path d="M1060 270 L1060 340" class="line green" marker-end="url(#arrowGreen)"/>
  <path d="M1030 400 L945 460" class="line green" marker-end="url(#arrowGreen)"/>
  <path d="M1090 400 L1175 460" class="line green" marker-end="url(#arrowGreen)"/>
  <path d="M1040 400 L945 580" class="line green" marker-end="url(#arrowGreen)"/>
  <path d="M1080 400 L1175 580" class="line green" marker-end="url(#arrowGreen)"/>

  <g transform="translate(550 720)">
    <path d="M0 0 H305 L330 25 V90 H0 Z" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="14" y="24" class="note">Catatan akses:</text>
    <text x="14" y="47" class="note">/checkout tanpa login diarahkan ke /login.</text>
    <text x="14" y="70" class="note">/admin hanya dapat diakses role admin.</text>
  </g>
</svg>
