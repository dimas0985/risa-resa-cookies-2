<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1200" viewBox="0 0 1700 1200">
  <defs>
    <style>
      .title{font:700 24px Arial,sans-serif;fill:#78350f;text-anchor:middle}
      .lane-title{font:700 17px Arial,sans-serif;fill:#111827;text-anchor:middle}
      .act{fill:#fff;stroke-width:2;rx:10;ry:10}
      .cust{stroke:#b45309}.sys{stroke:#64748b}.admin{stroke:#2563eb}.wa{stroke:#16a34a}
      .decision{fill:#fef3c7;stroke:#b45309;stroke-width:2}
      .decision2{fill:#e0f2fe;stroke:#2563eb;stroke-width:2}
      .txt{font:600 15px Arial,sans-serif;fill:#111827;text-anchor:middle}
      .small{font:600 13px Arial,sans-serif;fill:#374151;text-anchor:middle}
      .line{fill:none;stroke:#374151;stroke-width:2;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#374151"/>
    </marker>
  </defs>
  <text x="850" y="45" class="title">Activity Diagram - Sistem Informasi Penjualan Kue Risa Resa Cookies</text>
  <rect x="60" y="80" width="500" height="1040" fill="#fff7ed" stroke="#92400e" stroke-width="2"/>
  <rect x="560" y="80" width="480" height="1040" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <rect x="1040" y="80" width="360" height="1040" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="1400" y="80" width="240" height="1040" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="310" y="112" class="lane-title">Pelanggan / Pengunjung</text>
  <text x="800" y="112" class="lane-title">Sistem Website</text>
  <text x="1220" y="112" class="lane-title">Admin</text>
  <text x="1520" y="112" class="lane-title">WhatsApp</text>
  <line x1="60" y1="122" x2="1640" y2="122" stroke="#cbd5e1" stroke-width="2"/>

  <circle cx="310" cy="158" r="18" fill="#111827"/>
  <rect x="190" y="205" width="240" height="56" class="act cust"/><text x="310" y="239" class="txt">Membuka website</text>
  <rect x="680" y="205" width="250" height="56" class="act sys"/><text x="805" y="229" class="txt">Menampilkan beranda dan</text><text x="805" y="249" class="txt">produk populer</text>
  <rect x="190" y="305" width="240" height="56" class="act cust"/><text x="310" y="339" class="txt">Melihat katalog / detail produk</text>
  <rect x="680" y="305" width="250" height="56" class="act sys"/><text x="805" y="329" class="txt">Mengambil data produk</text><text x="805" y="349" class="txt">dan stok</text>
  <polygon points="310,410 390,455 310,500 230,455" class="decision"/><text x="310" y="452" class="txt">Produk ingin</text><text x="310" y="472" class="txt">dibeli?</text>

  <rect x="190" y="545" width="240" height="56" class="act cust"/><text x="310" y="569" class="txt">Pilih pesan langsung</text><text x="310" y="589" class="txt">via WhatsApp</text>
  <rect x="1435" y="545" width="170" height="56" class="act wa"/><text x="1520" y="569" class="txt">Membuka chat</text><text x="1520" y="589" class="txt">pemesanan produk</text>

  <rect x="190" y="655" width="240" height="56" class="act cust"/><text x="310" y="679" class="txt">Menambah produk</text><text x="310" y="699" class="txt">ke keranjang</text>
  <rect x="680" y="655" width="250" height="56" class="act sys"/><text x="805" y="679" class="txt">Menyimpan keranjang</text><text x="805" y="699" class="txt">di localStorage</text>
