  <rect x="190" y="855" width="240" height="56" class="act cust"/><text x="310" y="889" class="txt">Klik checkout</text>
  <polygon points="805,835 885,880 805,925 725,880" class="decision2"/><text x="805" y="877" class="txt">Sudah</text><text x="805" y="897" class="txt">login?</text>
  <rect x="190" y="965" width="240" height="56" class="act cust"/><text x="310" y="999" class="txt">Login / registrasi akun</text>
  <rect x="680" y="965" width="250" height="56" class="act sys"/><text x="805" y="989" class="txt">Validasi akun dan</text><text x="805" y="1009" class="txt">token JWT</text>
  <rect x="190" y="1060" width="240" height="56" class="act cust"/><text x="310" y="1094" class="txt">Mengisi alamat pengiriman</text>
  <rect x="680" y="1060" width="250" height="56" class="act sys"/><text x="805" y="1084" class="txt">Membuat pesanan</text><text x="805" y="1104" class="txt">dengan status pending</text>
  <rect x="680" y="1145" width="250" height="56" class="act sys"/><text x="805" y="1179" class="txt">Validasi stok produk</text>
  <rect x="1435" y="1060" width="170" height="70" class="act wa"/><text x="1520" y="1086" class="txt">Membuka WhatsApp</text><text x="1520" y="1106" class="txt">berisi ringkasan</text><text x="1520" y="1126" class="txt">pesanan</text>

  <rect x="1115" y="655" width="220" height="56" class="act admin"/><text x="1225" y="689" class="txt">Login sebagai admin</text>
  <rect x="1115" y="755" width="220" height="56" class="act admin"/><text x="1225" y="789" class="txt">Membuka dashboard admin</text>
  <rect x="1115" y="855" width="220" height="56" class="act admin"/><text x="1225" y="879" class="txt">Tambah / edit / hapus</text><text x="1225" y="899" class="txt">produk</text>
  <rect x="1115" y="965" width="220" height="56" class="act admin"/><text x="1225" y="989" class="txt">Melihat dan mengubah</text><text x="1225" y="1009" class="txt">status pesanan</text>
  <rect x="680" y="1240" width="250" height="56" class="act sys"/><text x="805" y="1264" class="txt">Memotong / mengembalikan</text><text x="805" y="1284" class="txt">stok sesuai status</text>
  <circle cx="805" cy="1365" r="22" fill="#fff" stroke="#111827" stroke-width="3"/>
  <circle cx="805" cy="1365" r="14" fill="#111827"/>

  <line x1="310" y1="176" x2="310" y2="205" class="line"/>
  <line x1="430" y1="233" x2="680" y2="233" class="line"/>
  <line x1="680" y1="261" x2="430" y2="305" class="line"/>
  <line x1="430" y1="333" x2="680" y2="333" class="line"/>
  <line x1="680" y1="361" x2="390" y2="455" class="line"/>
  <line x1="310" y1="500" x2="310" y2="545" class="line"/><text x="365" y="528" class="small">Ya, langsung WA</text>
  <line x1="430" y1="573" x2="1435" y2="573" class="line"/>
  <line x1="310" y1="500" x2="310" y2="655" class="line"/><text x="388" y="630" class="small">Ya, lewat keranjang</text>
  <line x1="430" y1="683" x2="680" y2="683" class="line"/>
  <line x1="680" y1="711" x2="430" y2="755" class="line"/>
  <line x1="310" y1="811" x2="310" y2="855" class="line"/>
  <line x1="430" y1="883" x2="725" y2="880" class="line"/>
  <line x1="725" y1="880" x2="430" y2="993" class="line"/><text x="620" y="942" class="small">Belum</text>
  <line x1="430" y1="993" x2="680" y2="993" class="line"/>
  <line x1="805" y1="1021" x2="430" y2="1088" class="line"/><text x="625" y="1040" class="small">Valid</text>
  <line x1="805" y1="925" x2="430" y2="1088" class="line"/><text x="650" y="1025" class="small">Sudah</text>
  <line x1="430" y1="1088" x2="680" y2="1088" class="line"/>
  <line x1="805" y1="1116" x2="805" y2="1145" class="line"/>
  <line x1="930" y1="1173" x2="1435" y2="1095" class="line"/><text x="1070" y="1133" class="small">Stok cukup</text>
  <line x1="1520" y1="1130" x2="1225" y2="655" class="line"/>
  <line x1="1225" y1="711" x2="1225" y2="755" class="line"/>
  <line x1="1225" y1="811" x2="1225" y2="855" class="line"/>
  <line x1="1225" y1="811" x2="1225" y2="965" class="line"/>
  <line x1="1115" y1="993" x2="930" y2="1268" class="line"/>
  <line x1="805" y1="1296" x2="805" y2="1343" class="line"/>
</svg>
